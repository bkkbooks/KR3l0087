body:
  text: 先進遺風小說家𩔖一雜事之屬提要臣等謹案先進遺風二卷明耿定向撰毛在増補定向有碩輔寶鑑要覽已著録在自署太倉人其始末則未詳也是書畧倣宋人典刑録之體載明代名臣遺聞瑣事大抵嚴操守礪品行存忠厚者為多盖明自嘉靖以後開國敦龎之氣日逺日漓士大夫怙權營賄風尚日偷定向陳先進之懿行以救時弊故所紀多居家行已之細事而朝政罕及焉考其著書之時正分宜驕怙之日定向其有㣲㫖乎其間如曲譽李東陽之𩔖未免鄉曲之私提唱姚江之學亦未免門户之見然著書大㫖不在是略其小疵可也此本為陳繼儒秘笈所刻體例混淆定向原書與毛在所續輯不甚可辨間有論斷亦不知為誰語以行欵推之殆每條第一字跳行者為定向之書其第一字平書者為在之書歟今未見定向之原本不可考矣乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:80041d5bc7d0b5030cfa51f3b21be0fdce5b5cfea0679a4b336e94b687dde1c9
