body:
  text: 先進遺風卷下明耿定向撰毛在增補吳冢宰公琳父應澍富好行德與吳草廬魯子翬軰諸名賢友善元朝徴詔不起書西山先生褒之至今稱西山先生公業儒通經術高祖平陳歲用詹同薦召為國子博士嗣􅁶浙江按察司僉事歴貳鹺臺著績入為起居注吳元年命同魏觀求遺賢於四方陞太常卿進兵部尚書京闈鄉試上曰琳經學優命與司業宋濓典試事洪武三年改吏部尚書賜誥褒美公既入吏部與詹同迭視事㝷公以老乞致仕既家居上嘗遣使察之使者潜至公旁舎見一農人坐小几拔秧布田貌甚端使者問曰此有吳尚書者家何在其人尚在否公斂手對曰琳是也使者還白状上益重之復召入為原官後在吏部堂座上一旦瞑而逝王忠肅公翺為吏部尚書忠清為英皇所任信仲孫以廕入監應秋試以有司印卷白公公曰汝才倘可登第吾豈忍蔽之顧汝學尚未萬一誤中選則妨一寒士矣且汝有階得仕何必強所不能以幸冀非分耶裂卷火之公一女嫁為畿輔某官某妻公夫人甚愛女毎迎壻固不遣恚而語女曰而翁長銓遷我京職則汝朝夕侍母且遷我如振落葉耳而故恡者何女寄言於母夫人一夕置酒跪白公公大怒取案上器擊傷夫人出駕而宿于朝房數旬乃還第壻竟不調公為都御史與太監某鎮守遼東某人亦循理守法與公甚得也後公改督兩廣太監泣别贈大珠四枚公固辭太監泣曰是非賄得之昔先皇頒僧保所貨西洋珠于侍臣某得八焉今以半别公公固知某不貪也公受珠納所著披襖中紉之後還朝太監物故矣求太監後得二從子公勞之曰若翁亷若軰得無苦貧乎皆曰然公曰如有營予佐爾賈二子心計公無從辦特示故人意爾皆陽應曰諾公屢促之必如約乃偽為屋券列賈五百金告公公拆襖出珠授之封識宛然少保于肅愍公謙己巳之秋邉塵翳天皇輿播越於迤北戎馬躝蹂於郊坰變在呼吸間耳幸不至如靖康永嘉之禍者公之力也惟公時擘畫所最難者有七彼時闕庭閧然而譁監國欲退已成甘露之變矣公上陛掖留請立斃王毛二豎以紓衆憤請宣諭王振應族俟命行誅馬順應死擊死勿論而羣情乃定一也嗣監國新立法紀不章戰守無具邊患且方熾也公首正扈駕失律之罪亟請遣官募義勇集民夫更漕卒練營兵以備征調且除戎器調兵食傳檄邉鎮近省並授方畧遏敵勤王二也嗣徐珵倡議南􅁶踵宋季南渡之覆轍矣公慟哭抗言力排其議自是根本始固三也石亨請閉九門以避敵鋒㡬以百萬生靈畀敵矣公令盡移郭外居人入城背城而軍德勝門外堅壁清野急散官軍通州倉糧百萬盡入都城不以資敵四也喜寧嗾敵邀大臣議和後叅將許貴亦請與和緩師是季宋欵軍之愚計也公即出德勝門對疊約戰勵將誓師而敵始震沮五也喜寧異族以國為市此奸細也公授計擒之以絶禍本六也嗣是額森悔禍奉上還京其時外患甫戢内釁漸萌奉迎之議上不樂聞調停少失于戚之事兆矣公昌言大位已定不敢異議惟君臣大義兄弟至情自應遣使奉迎上乃勉從七也且其時閩越嶺南劇盜鋒起南蠻西蕃亦復蠢動公内固京師外籌邉鎮防衞陵寢散遣降人抗控漕渠開鎮臨清收復獨石八城堡蒼黄注厝動中機宜一時經畫奕世永頼者不可殫述殆若天授神啟豈公之智算異等抑公之精誠無二耳惟額森擁上皇大同城下勒降也大同人登城謝曰頼天地宗社之靈國有君矣至宣府城下亦然至京城下亦然公實引據孟子社稷為重之言實合漢帝分羮之謾對襲鄭人伐許之故智也事以之成疑以之生悲夫公嘗言此一腔血不知竟灑何地嗟嗟公之血誠已灑於此矣太子之易南城之錮公何以自解於英皇顧九廟列聖享血食於無疆者當亦鍳公此血誠也抑世僉謂倜儻非常駘宕不覊者可濟緩急彼繩尺修謹士齷齪難與應卒支變云乃公故潔亷方正一錢不取力遜賜第止宿直房旁無姬妾數椽敝廬僅蔽風雨㡬畞薄田纔供饘粥食無兼味衣無累帛巡撫兩省㡬二十餘年議事入京也不持一土物以賄貴要兩袖清風之咏汴人至今傳誦之由是以觀論材品者尤重原本哉盖未有侈於奉身而能致其身未有急于狥世而能以身狥國者也視公可鏡已魏文靖公􅂹讀書山寺中見一毒蛇方化鱉惡而避之俄有漁者捕之以去公懼傷人追買棄之貸僧錢以償既以博士起家累官吏部侍郎奉命往南都考察京官時官舎止携一蒼頭歴年所積俸貲携之不可歸之無人乃召同鄉同年子官刑曹即者付之其人請封鑰公怫然曰後生軰何待前軰薄乎其人不敢復言時有子壻從官舎如其輕重欵識為偽銀而盡盗其真者比公南都竣事歸出俸銀令銀工碎之則偽也公意部司之弊嘆曰近來官員無良一至是乎乃又出柴薪銀猶夫偽也銀工私於蒼頭曰昔有某官舎人嘗為此物出自予手將無是乎蒼頭以告公戒之曰慎勿洩彼將不安矣寧亡金可使失懽乎已而刑曹即陞辰州知府請教於公公曰君練事體又精刑名何郡之足為第須勅舎中雖至親不可忘防檢刑曹郎恒念其語不置己舎中人稍稍露其事辰州入覲乃携其俸入盡數以償公駭曰君誤矣奈何以不明跡加人不韙乎予銀具在未有以偽易者迄不受比以南京太宰致仕歸晨夕田間布衣草履首竹笠以課傭作與野畯雜處不少崖異云年九十八卒遺書子完勿擾鄉里營墳墓周亷憲公鑑字孔明由㑹魁進士選授御史公少受經千安成所友交皆名士嗣為御史按江西㑹監鄉試所交名士多中式者時執政吉州陳公某其子怙勢多不法虐其里人公出都門時陳曲意凂公為庇公按部至吉州訊諸士民盡得其状竟䋲以法不少貸陳銜之而諸不舉者承其意奏公狥私嗣㑹試事竣奏中所指者多成進士而彭華者且掄大魁朝紳益藉藉嘆公得士陳無以中第諷詮司出之為滇南憲副九年不調㝷考績北上江行覆舟公瀕危幸免候吏檢其行李止二革笥故衣數襲積俸三百金耳嗣晉山東按察使公度執政者不能忘遂引疾歸歸而與董僉憲應軫李方伯正芳友善邑令構亭居之有大政必稟度焉盖模古三老云孫廷徴字公賢由學博文行異等選為山東道御史巡鹽河東瑾貴賂不遂摭事下詔獄乆之得釋已按陜西㑹寘鐇以寧夏叛戕撫臣暨總戎公時駐延綏聞變馳至榆林以先發義檄叅將時源討逆而射書城中說廢將仇鉞者為内應不浹旬寘鐇成擒露布未及達闕庭而朝議起楊文襄督京軍征討太監張永監之永方至潼闗聞報馳入陜攘功時源兵憤而譟紀功黄門自經死公单騎馳入軍中折矢而誓之曰邉軍欲亂吾以京軍討之京軍欲奪而功吾以死争諸軍乃戢公亟為上疏列其功永既入朝攘功不已㑹公亦事竣還朝永於御前刼公歸功于己公於朝班中挺出抗言曰功如是如是臣即死耻食言於軍士也于是寜夏之亂始定而永憾公不釋㝷劉六劉七羣盗起畿内將泝江淮而上永嗾秉銓者以公習兵事出為九江兵備公至踰月殫精調度劬而病賊再至公再以舟師郤之竟以是瘁卒卒無以殮當路括官錢備衣棺殮之以其䘮歸既歸流冦數千掠羅田入麻城經公之門將犯之既入觀所居敝陋徒四壁立異之而賊魁趙鐩者故儒生尤咨嘆焉乃書空空二字於門屏而戒所部毋犯時邑中諸村所過皆煨燼矣吁盜亦有人心哉余按公平寘鐇與新建之平宸濠始末大畧相方乃竟未有表公功者永故之以也時文襄又方用永圖逆瑾故雖心欽公為真御史而竟不能顯公功云余聞公䘮歸以貧乆不能𦵏莊襄公為卜兆𦵏之諸孤益貧莊襄撫教之如子前軰篤友誼如此王莊毅公竑為督漕開府淮揚時清河衞指揮單姓者行不檢公嘗折抑之㝷公遭煩言免官歸過清河揮使祗候于江滸具餼致慇懃公嘉其誠欵擇受數缶以為醯醤也既發用之則皆糞穢單盖藉以紓夙恨云乃公舟抵徐復有言者表公生平忠節㫖下命公還官指揮乃逃遁遐方詐為死家人故為發䘮治殯以愚里人人有仇指揮者踪跡其所在執而訟之于公竟不較前侮平其訟而遣之淮揚間至今語曰王都堂不較單指揮不念舊惡云愚按王莊毅手捶死馬順干殿陛間盖矯矯剛方人也乃容忍又若此豐布政公慶景泰初以給事中諌南城及易儲事言甚凱切逮繫詔獄七年英廟復辟陞河南左叅政論周府内官不法事上嘉之陞本司右布政使亷聲大著風裁振于郡邑一日行部有一知縣簠簋不飭聞至大懼無以紓解乃以白金為燭饋之踰數公初未之省也既而㕔子以告公佯曰試燃之乎㕔子曰燃而不燃也公又曰不燃則還之耳次日從容謂知縣曰汝燭不燃盡出之以易可燃者自今無復爾矣知縣大恐輒棄印綬而去終亦不明其為銀燭事也論者曰此一事也而持己之亷待人之恕逺謗之智胥得焉凡納賄於上官者上官不忍其欺也而暴揚之衆謂其有以来之也嫌疑之際卒不免於禍若公者非當官之師法乎右見張東沙芝園集附鄭端簡公曉官文選時里中士宦有餽金首飾承篚以將而上覆之茗公直以為茗也受之入夫人手撥茗知之靣頸發赤亟擊柝請公入以語公公逌然不動聲色第整理其茗覆篚如初出坐亭中召其人還謂曰吾初以家􅆘乏茗故拜君惠頃入内詢之家尚有餘茗心謝尊意已授之令持歸太宰孟山楊公為北邊兵憲時有將官名將子也因事被勘於公所公勘得其實酌情法之中處之將官心徳公故假公移郵筒中具掲托名蔬菜具中緘銀幣若干致謝公即公移中批發不収且告誡之踰時公轉大叅行衆將官旅見其人獨惴惴惶恐伏地若無所容者公佇立亭階槩以温語奨諭諸將官至其人曰汝父名將也觀汝貌誠不媿將種第汝年少更事少後當益努力以承父業其人神情恍然若更生云愚按鄭公之郤賄也從容暇裕若此非素有養不能也且即其夫人若此其刑于之化可知己若楊公之郤賄不獨裁之以義抑且濡育以仁即一語間便令人有生色焉若徒自皦皦立節而令人惴惴媿懼終身生機息矣安能望之戮力於疆場哉憶余往處闗中一州守事義則未疚仁則有媿於公也王端毅公恕由庶吉士授大寺評事陞寺副出知揚州府屢辨疑獄嵗饑發廩不俟報且給醫藥多所全活歴江西河南布政拜右副都御史撫治荆襄南陽多平賊功帥欲縱兵搜山公不可下令擅殺者斬復榜示流民復業㝷巡撫河南載巡撫雲南劾鎮守内臣錢能陞右都御史中貴有以黄鸚鵡上獻者公疏言漢末鼠巢于樹野鵲變色識者以為不祥夫鸚鵡本緑羽而今黄非野鵲變色之𩔖與書曰不貴異物則逺人格乞降詔痛絶貢獻時有駕帖下即中鍾蕃所公言故事駕帖下諸司司禮監用印刑科掛號皇城諸闗防今皆無何以為信在任九月疏凡廿上㝷進右都御史時中官王敬乘傳東南搜索竒玩公引唐太宗遣使梁州諷李大亮獻名鷹明皇令益州織半臂背子捍撥鏤牙大亮與蘇頲不奉詔事疏上詔下獄同惡伏誅中外快焉轉南京兵部尚書叅賛機務時刑部員外即林俊論妖僧繼曉下獄經歴張黻救俊亦下獄公言二人志在盡忠疏留中㝷有㫖令致仕孝廟即位召為吏部尚書公薦諸名公卿引置執政抑僥倖奨名節拔淹滯中貴無敢干以私通政司經歴高禄以内批為本司叅議公言以天下官待天下才勿可以親戚妨公議公遇事輒言言有不合即引退執政不恱者謂其好名㑹南臺薦公入内閣不恱者益忌之嗾御醫劉文太指斥公公力求去遂致仕公家居時見子姪易左右鄰居為業公呼而譲之曰是與我世比居者何忍俾之逺去乃召之各還居給以原券不問價年八十餘葺廬於先隴之次搜閲典籍編歴代名臣諌議一百二十卷又作石渠意見務剗俗學而又搆玩易軒討究易理作後又作石渠意見拾遺二卷已又搆玩易軒討究易理作石渠意見一卷讀書至耄不倦視衞武公之九十不忘交儆不殊也昔趙清獻家三衢所居甚隘子姪以厚貲易隣翁居以廣其第公不樂曰此翁三世為鄰忍棄之乎命亟還其居而不取值蘇長公買陽羡田聞田主嫗泣而還券事亦𩔖此耿文恪公裕授給事中以父九疇官尚書改翰林官至禮部尚書時嘗語人曰吾暮自部歸必經過三原王公之門見其老蒼頭毎持枰買油念吾自入仕未嘗買油已心竊媿也後公代王為吏書崔後渠洹詞亦及此朝士嘗言王公子自三原來京省公只如貧士自僱一騾毫不干有司一女適宋監生止乘兩人所畀肩輿此在公亦其常也近見楊太宰家眷往回亦如是附太宰屠㐮惠公滽部堂燕居令辦事官捧硯時公新衣白綾甚澤其人誤傾墨汁狼籍公衣惶懼懾息頓顙請罪公曰去去汝何為者吾方惡其泰白易汙也適與意㑹汝何為者此與韓魏公不責碎盞吏同襟度矣鄉有柴姓者假稱屠公子沿途騷動人以聞于公意公必大加譴責詰發其奸公但呼而戒之曰汝為吾子亦不辱但難為汝乃父耳法有眀禁自今慎無復為此其人頓首而退歸營第宅規畫已定前為老嫗敗屋二楹􅆘當門樓之基屢使人從容譬說而欲券之其嫗堅不聼命既得吉矣公於丙夜從一小奚往扣其門嫗曰扣門者為誰小奚告之嫗曰此不過欲劵吾屋耳此吾死生所也券則須徙吾惸惸老寡將安歸乎公曰汝第起吾與汝商之汝意不過憚徙耳今券而不汝徙也但去敗屋而更之新聼汝居也不限以年令汝子以其貲賈販稍為生殖俟别有家也而方議去住不亦可乎嫗曰即如是幸甚但須明載券中公乃袖出柴薪二錠凡重二十四兩浮其直付之嫗乃以其子販粥日有生息乆之告公辭去公遽止之曰此可相安不汝厭也嫗曰賴公之賜天亦助之今已立業娶婦矣擇日當徙復何待乎公曰嫗幸得所其如去舊鄰何欵以飯食為之惆悵而遣之鄞洞雲張翁尚書文定公邦竒之父也公為學憲時其㕔事僅二楹上官過訪頗不便旁一楹乃其叔之居也􅆘叔有宿逋願售公以倍價買之將重構焉告於翁翁問價㡬何以若干對翁知其倍也甚恱己忽潸然淚下公訝問故翁嘆曰噫吾想至日拆彼屋以豎我柱使其夫婦何以為情是以悲耳公乃惻然曰大人寛心兒當還之遽抽身取券翁又止之曰毋吾計其銀已隨入手償人去矣將若之何公曰第併其價不取可也翁乃忻然曰若然慰我甚矣吁翁之孝友仁慈載諸傳誌允哉淳徳此特其遺事一節耳宜其篤生文定勲名道徳卓然為一代純臣也右聞屠竹墟公言愚按洞雲張翁還券事本為同胞至情視王屠二公及宋趙公之不忍亟徙鄰居尤其不容己者顧風澆俗薄世人第利目前子居之便孰推念叔氏異日不堪之情哉文定公先意承志得父歡心仁心孝友視范忠宣麥舟之能推父意尤為當然憶昔吾友羅惟徳任寜國時一日謁余喜動顔色隨拊掌自鬯曰今日一大愉快事余問曰何事曰近貧宗有十數人以饑􅂽逺来乞周比積俸餘施散殆盡家大人以下及諸眷屬無一阻撓我者為是鬯然耳時聆之以為淺談也今追思之難哉難哉惟徳時精神通於一家矣余儌天之幸父母兄弟妻孥原自一心從来出納施予更未經余相忘而不知為可喜耳少保秦襄毅公紘初為南京御史有風裁以劾中官降北黄驛丞嗣因薦陞知雄縣又以禁中官捕獵被誣搆禍㡬不測民數千走擊登聞鼓訟寃得宥成化初為鞏昌知府清亷自守禁官府和市吏民畏愛十三年陞陜西叅政十八年陞僉都御史巡撫宣府破敵柴溝堡㝷廵撫陜西時以約戢秦府旗校肆横為秦王訐奏被逮下詔獄上命内臣尚亨籍其家止得黄絹一疋故衣數事亨還言公貧状上親閲其貲嘉嘆立釋公且賜鈔萬貫旌其亷調巡撫河南㑹汪直至他廵撫率屈禮公獨與抗宻疏直多帶旗校擾地方直還上問各省撫臣賢否直獨稱公亷能上出公疏示直直頓首伏罪益稱公賢𢎞治三年以右都御史總制兩廣軍務多平賊功劾總兵安逺侯栁景不法詔逮下獄追􅂍鉅萬褫其爵景干内摭他事誣訐公亦被逮坐免臺交章論救三原在吏部極言公亷直忠信不可棄改南戸部尚書十四年邊報急召公户部尚書兼憲職巡撫陜西隨總制陜西三邉軍務㝷召還部辭得致仕年八十卒贈少保諡襄毅公剛毅亷介歴官四十餘年提兵南北列位孤卿所居僅避風雨妻孥菜羮麥飯不改其舊及卒家無餘貲未㡬子孫有貧乏不能存者逆瑾專政時復以誣搆公籍其家竟無所得許襄毅公進成化中公以御史丁憂還里已起復上京惟乘馬其配髙夫人素病眩暈不能御車亦騎而從竟不索轎時仲子司徒誥方在襁褓叔子少傅讃娠在腹而司馬論則其季也三子既皆登上卿諸子姓列大夫牧守郎官者以數十當代世家稱甚盛者鮮儷云附司徒公誥嘗曰吾近見士人失官憤恚若䘮吾甚惑之夫官朝廷物也来若被衣去若解帶豈吾支體若乎故雖屢進屢退不見喜愠之色其論學謂理氣渾全本無支離宋儒力詆虚無以排二氏及自為論析理氣為二不知自墮於佛老之見也浚川王公深然之文簡公讃嘉靖中自家起為太宰所過沿途有司殫力飭厨傳華供帳除治道途若迎乘輿然余里陳公文者時方為邑宰初尠治聲顧獨泛常視之諸草草不為加意公過而識之曰此必雅志古道者既莅任亟陞為戸主政陳司冦公夀由科給事中累官刑部尚書致仕後僑寓南京蒙詔進階一品羊酒綵幣存問公在諌垣指陳時政得失無隐惟不喜彈劾曰吾父戒我勿作刑官枉人而言官枉人尤甚顧可輕耶故公雖敢言而不搜索士大夫短長以沽直名云附楊文襄公一清曰宋王素為諌官言人材難得無事之時當為朝廷愛惜明道先生為御史神宗召問所以為御史對曰使臣拾遺補缺禆賛朝廷則可使臣掇拾臣下短長則不能本仁得之矣本仁公字余往待罪柱下時以職事有不容己者兹睹公語惕然心悚面發赤已平日彈章命子弟亟削其稿鄭端簡公曉曰予聞之貢禹云居官而致富者為雄傑夫漢俗近古猶若此又何責於後世之靡靡者乎其軟黙狥時以終其身凡以利滑於心而不知戒也陳司冦立朝四十餘年於權奸歘赩無所跛倚屢起屢踣家貧不能歸流寓南都敝屋頽垣不蔽風雨卒不能為殮具豈不為雄傑者所姍笑耶然縉紳先生慕其風槩願為執鞭可以媿墨夫矣林司冦公俊公筮仕刑曹陳白沙薦至京公日與講學有得時妖僧繼曉挾近倖梁方以秘術進蒙殊眷公上疏請斬繼曉而黜梁方憲廟怒下詔獄加刑公對益厲謫姚州判王端毅在留都疏乞還之以勵忠節㑹元日星變憲廟感悟叙復南部孝宗踐祚廷臣薦擢雲南憲副俗崇釋信鬼鶴慶𤣥化寺稱有活佛歲時士女㑹集動數萬争以金泥其靣公按鶴慶命焚之父老言犯之能致雹損稼公與約積薪伺之果雹即止已而無驗遂焚之得金數百鎰悉輸之官代民償逋毁邉方諸淫祠三百六十餘區所在學宫敝撤其材新之肅皇在藩邸知公名召起公刑部尚書屢上章疏思竭忠愫以報知遇後以倖璫崔文事奏忤㫖遂乞歸八疏得允公性簡儉居官尤亷約不取𨽻金不費公廪蕭然若寒素深厭末俗侈汰欲以身為表率一時同徳請老推先焉既遘疾且疏豫辭身後䘏且及時政數事薦尚書羅欽順王守仁祭酒魯鐸脩撰吕柟宜用輔德云嘗過吳門訪二泉邵公寳于里第及門見邵公經始建坊大詫曰盛德如公亦效世俗子營此耶邵公曰公家科第雲仍此故可省某門户纔起立如制表宅里似亦非過也林公終不謂然由此以觀前軰名公以建坊為詬矣嘗謂人茍修徳即蓽門蓬户後世仁賢且過而式之徳茍不𩔖即今市童甿豎多相指訕詬之矣然則坊表之建不為播惡之具耶而士紳往往以此煩擾有司其識何卑卑也董大叅公朴公大父曰應軫解元官僉憲丈夫子七蟬聫科第有並時為南北御史者獨公父未仕公少魯攻苦誦讀日不能識數行鄰父見而憐之謂其父曰郎君不慧讀書非其質也奈何苦之曷不令牧耶公聞之憤丐工畫一牧子牧牛置座右益奮勵堅苦力學比長而發慧卒成進士以文學顯累官大叅公中年家居時按楚直指使者公門人也其秋當主監臨欲中公子先時緘書起居公密封所擬秋試經㫖寄公公發書覧而火之竟不以示子子故亦績學負儁材者後科遇别直指監臨亦卒中式是為士毅號三泉公叅江藩時三泉公為舉人家食遣僕候公宦邸公召至榻前問舉人家居何為僕對云里中比年大祲餓殍塞途舉人日募工瘞殍骼㡬千計矣公惻然又問曰舉人故窶甚募工費何能辦曰毎一殍計工費榖若干斛皆貸于族叔某也公曰是義當為者因還書勉三泉公大意云凡義所當為者闇然黙而行之更勿以章示人人㣲有取名意則淺陋甚矣其書尚存余省覽之中數百言諄諄道此事更無一語及家私也公嗣致政歸林下不肯以片字干公府嘗有鄰翁横罹盗誣為郡捕而過其門跪泣訴于公曰公素習我善良望活我公曰汝故知我素不干公府也其人頓首泣而去已公徐復心憐之召之還曰憶汝昔年新築室余曽詩以賀汝尚在否其人曰在曰汝第持此往余不作别字也其人執詩以見郡守守覽公詩即戄然曰而非良善董公肯以一字假汝耶遂釋之其見重于時若此公晚歲豫為宅兆豫製挽歌中有平生師魯叟死不運門材之句三泉公嗣謁選為蜀别駕己丑嵗以公務至京其年新第進士黄劉陳三公候之邸公胥令之侍坐首戒之曰慎勿輕買田吾為舉人時為人欺買田數畞為所累甚重謹識之嗣陞州守宦十數年許僅一青布袍一革靴耳赴任時諸子請曰大人平生志節兒軰能諒一切生事不敢少覬望大人矣第念大人年高蜀中多美材後事可為計也公曰唯唯既致政歸諸子迎之水次問計於公曰往者兒請命為後事計者如何公曰吾聞之人云杉不如栢也子曰大人今所具者栢耶公莞然曰吾兹載有栢子在種之可也吁公時子孫振振如是其所種栢子逺而蔽䕃耶余聞劉端敏公師事三泉公其清節亦有自也哉余聞長老述損齋公成進士後以差過岳州聞劉忠宣公宅憂在里造謁焉忠宣留之飯飯麥糈饌惟糟蝦一碟無它具公因感省終生持雅操云噫嘻賢喆之相與以有成也豈在情好浹洽語言懇欵哉雖然亦存乎人耳昔胡紘訪晦菴無􅃗雞斗酒之共而釀成禁學之禍矣董公顧以是感奮勵修其識豈不逺哉王文莊公鴻儒甫成童作書端勁得歐顔法以貧依親屬為府史者從治文書郡守段公堅見而竒之留居府中衣食之親課其業遂入郡學為諸生提學副使陳選嘗識其文曰是經世之文也舉鄉試第一成進士授南京戸部主事遷山西提學副使劉忠宣公薦于孝皇歴遷吏部左侍郎以甄拔為己任崇奨實行不純采虚名嘗曰濟天下事惟誠實者能之􅃐名者亦􅃐利無益也不見夏忠靖王塩山乎惟知有朝廷而不知有親黨惟知有天理而不知有身家如是社稷生民乃攸賴云公於書無所不讀大要以窮理致用為主雖百家之異同亦必探其原而審其義之所安故所得宏博奥衍交發互益其於六經沛如也善觀史毎以前代君臣之行事為案而已從中斷之審辨得失邪正上下數千年如指諸掌尤眀習國家故事自祖宗用人行政及前軰立朝行已之詳皆能一一言之嘗聞劉文靖誚丘瓊山有散錢而少貫索瓊山還誚曰公有貫索而却欠散錢云乃公讀書以窮理致用為主亦有貫索矣起家非詞林而得諡為文有以哉雖然世博綜者恃此休休心為貫索更妙也韓魏公為相時或謂公之德業無媿古人但公文章不逮歐陽永叔耳公曰吾為相永叔為翰林學士天下之文章孰大於是即此一語永叔之文章便為魏公一齊穿紐矣我朝最稱該博者莫如瓊山乃媢嫉白沙而隂擠三原雖博亦奚以為文靖誚其無貫索不虗也或謂文靖為篁墩短其不能詩銜之醸成廷鞫之獄文達之嗛葉文莊也亦以疵其詩文故余惟二公賢相也或未必然果若人言視魏公之度如何哉顧葉程兩公以能工詩文􅇜䜛搆于執政者如此然則知道者之于詩文直榆莢視之可也吳司空公廷舉字獻臣筮仕順徳縣與白沙陳先生游鄒立齋以直言謫石城吏目敬禮之有權璫市葛于縣公用其價買二疋送之曰奉此為式如不可即還金且葛雷産也璫怒取金去盖舊買貢物縣率令民買辦而還原金公獨不從督府檄公為權璫修廟且召見而欵語之公對曰守土官非奉舊例新恩一夫不敢役分金不敢用遂辭出嗣又以事忤逆瑾被逮荷校九日死而復甦瑾誅復用累官至南京工部尚書即疏歸公平生敝衣帶穿不修藻飾視財利如糞土妻子冒饑寒而施予不較有無居湫隘無郭外田丘墓之寄十餘畞卒之日殯殮無具御史姚鏌助之平生篤友誼見良士身下之忘其人已在太學兄事羅玘玘病痢㑹僕死公為煑粥負之登厠一晝夜十數返玘病瘥同登進士語人曰玘四十前生我者父母四十後獻臣生我也公好讀書積至萬卷慕薛文清及胡敬齋録采其要言作詩效陳白沙覽者見其志崔後渠曰銑平生頗識賢士大夫如吳公真才潔履厚行定力鮮儷也胡端敏公世寧正徳中公由南刑部陞廣西太平府知府㝷􅁶江西憲副時宸濠潜謀不軌吏於江西者勢怵利陷惟其欲之是聼間有稍知順逆者不過循黙自保觀望規避以脱虎口為幸耳孰有奮不顧身如胡公者哉疏朝入而禍夕發竟以脫身間走得免灰滅及械繫掖庭備嘗百毒朝之用事者悉受濠賂㡬陷不測矣賴御史徐文華等申救减死謫戍遼東躬履行間授徒以業嗣濠誅起官累仕至兵部尚書太子太保余惟己卯之變孫忠烈嬰其難王文成襄其勛燦然著矣由公觀之要皆焦頭爛額之儔也若公者其為徙薪曲突之謀者乎公為主事時嘗自賛云信而未孚者多言也正而未諒者多戲也周而若比者好稱人之善也恕而若刻者多發人之奸也過有甚於此者輕淺粗疎也然則無一長可取歟曰瞞人之事弗為害人之心弗存有利於國之事雖死不避三者吾將持是以終身焉而前數者氣質之偏則亦庶乎其有改也云跡公生平不媿其言矣公早嵗貧困寄食就學卓有經濟之志仕㡬四十年雖禄一品被服飲食猶素士也梁司徒公材平生清苦自持嚴於操檢為杭州守郡故以繁富稱於天下公練衣粗食屏斥華好泊如也㑹入覲止具一書二帕以䞇京貴槖中無一長物知者詫之歴轉浙江按察方伯執法不撓時巡按御史何鉞同里人也公以前軰不為過禮何疑其易已積不能平乃誣十惡奏之銓曹察其非實量移雲南公居之恬然不以為介曰御史言果當即譴死無恨否則自有公論在矣綰藩時凡入民課金輒令納戸自稱而親為監督主藏者不得髙下其手凡往来傳置諸所饋遺即果蔬弗受也既為户部尚書夤縁請寄一切謝絶數令親信察市價低昂􅄃户不得乾没所省官錢不可貲算時相張永嘉新進寵倖常以意氣折辱公卿一日於朝㑹勵聲語曰梁大用某處糧草當辦則應曰己喻曰某處折銀當發復應曰己喻張意初輕之謂其中黯黯弗了也即而偵之則無弗夙具者曰渠固若是辦耶心欽焉公終日約勵所屬坐部治事不得私有出入即郊廟大祀與嵗節朝賀不廢退食之室於几榻恒置四書律例有間即諷誦之以為常公嘗曰秀才讀書做官不要錢是分内事不可向人說况恃以驕人乎公平生為國薦賢不欲人知曰恐来物議也公又嘗曰昔顔子犯而不校某敢當之云即遇同里何御史事公言不虗也可以為難矣蔣司空公瑶為揚州太守㑹武廟南巡諸省騷動凡乘輿供御及宦寺宫妾親軍賂遺莫可貲算公曰備亦罪不備亦罪備則患及於民不備則患止於身乃僅鳩供應之具不復横斂以為媚恱自衣青布袍束黄金帶奔走周旋權倖江彬軰横加折辱不為動一日上捕得大鯉謀所鬻者左右正欲中公曰莫如揚州知府宜上乃呼而屬之公歸括女衣并首飾數事蒲伏而進曰魚有值矣他無所取惟妻女衣装在焉臣死罪臣死罪上熟睨之曰汝真酸子耶吾無須於此其亟持以歸魚亦不取值矣由是清節動天下歴仕至工部尚書白首懸輿卒無改於羔羊之節士論韙之論曰維時乘輿至止天威所臨生死呼吸間耳公􅂸一身以翼蔽其民難矣難矣近世仕宦者競飭厨傳華供帳以取上官一時之媚剥民膏脂而不惜者獨何心哉張少叅公繼孟字子醇公以禮部儀制司郎中陞山東布政司叅議年未五十致政歸居林下家徒四壁立居旁建茅屋三楹鑿池為橋植竹數竿扁為一笑亭日觴咏其中禁足不出客至第肅至階送亦不出門即朝貴枉訪止折柬相答于勢利紛華泊如也嘗言作人須要有趣對俗客嗒然無一語遇學士大人有道術者與之譚說名理揚搉風雅亹亹不倦令人灑然不能遽别前軰一時如西涯相公蒲汀尚書皆海内宿望常聫輿過訪公或留坐所共脫粟之飯間出蔬果杯酒三五巡即止諸老凡自公第出輒喜見眉宇相謂曰吾儕遇張子醇一飯勝倍别家盛筵矣其為人愛重如此楊方伯守魯既第筮仕揚州府推官瀕行候謁請教公謂曰只要做得人好不論做官做得人好時充軍也得為民也得夫當後生筮仕初即為此厲語不為忌諱楊公亦終身佩之不嗔為不吉語古道如此年八十卒卒之日至無以為殮其子以訃聞於諸同年在京宦者得贈若干金始克襄事云方司徒公鈍當分宜柄國時寵賂滋章天下士宦靡然顧化即下之簿倅丞尉無不賄其里之尊貴人以儌庇植而里之尊貴人亦多以是為餌若軰計者公見里中此軰以竿牘通者輒峻郤之其人或固以請曰此具薄俸非取諸民也公則蹙容曰汝俸㡬何俯仰攸賴奈何推以遺我王法可畏民生可念汝不能其官我不能為汝庇遺我何為或復曲為詞曰此書一帙耳公則又曰余一自入任所習惟一大明律耳何暇讀他書書積不讀而徒以累他日歸途夫役大非隂德事也竟片札不受里中癡子反有以為憾者余初魁南宫時謁公余請拜公抗顔曰勿拜余乃揖己命予坐時有郎差臨清者先在座公若不禮余者第顧郎諄諄誨之嘗顰蹙曰往聞薦紳過此者必具豐餼華燕今民窮極矣如此皆膏脂非爾我所藉以奉人靣皮者但遇相知夙契一飯相延道故商心自是欵洽奈何如此予初覩公遇予若甚倨乃聆其語戢戢有味于中不欲辭去已郎官别去仍一語不及予予起更端請曰小子起家蓬茅願領教公厲聲曰爾云蓬茅誰從母胎中即成進士耶予惶恐不敢再更端請起辭公送之門屏間謂余曰予即日廷試矣上發䇿必有所欲言汝對中須言敬天惟在愛民親賢當先逺奸謹識之毋洩予乃揖謝教而出公嘗謂新進者云作官無他言作到老學到老是矣嗣觀政時公數數召同鄉中士紳飲序以齒不論官座中常有進士以齒加於京堂上者具嘗惡草而情固欵洽也嘗訊諸進士曰汝軰㡬人一寓㡬人一𨽻也大都所言皆前軰時事時套若勿聞已余初第時猶一及見此等風致幸矣今亡矣夫周中丞公延初第時與其里中進士曾同觀政刑部共賃一寓共租一馬更乘出入一日公先入部方回馬輒迎曽曽未及至而司冦公適蚤至鳴鐸升座矣司冦視班行曽不至詢其故公前以實對司冦公大詫曰今進士俱乘馬耶亦大異矣予觀政時一僮携冠服徒步至三法司門乃服之入也今士風即至於此為之三慨焉公語今蕭右司冦廪云蕭公亦吉州人也吁使司冦公覩今士習慨又何如吳太宰公嶽為廬州守時中丞南眀王公廷為蘇州守二公同年友也一日以公務㑹于鎮江吳折柬徴王公為金山之遊載酒一瓶米數合肉斤許蔬一束於舟中屏騶從趣王公同舟而往王公熟視其具笑曰兄昨折簡相徴招將為主延欵我也其具止是耶吳公曰足吾兩人用可矣多具何為比至吳公命庖丁即所載酒肉蔬米治具相與論心話舊或趺坐磯頭或倚徙水際盡歡竟日而還王公晤余淮上為道其事余喜聞後嘗模之以待同志云惟今士紳宴㑹如此風致豈不可嘉尚哉公為廬守無何以宅憂還里行間阻隂雨持公署一傘歸歸舎仍還之屬貯庫余校士于廬廬人士至今口其事云公起復補保定守後嚴太宰清亦任保定守余毎過保定遇此中士紳輒詢二公政績孰優一士紳謂余曰二公皆吾郡之名守也嚴之德澤洽我民肌膚矣若吳公徳澤則尤入我民心髓也余嘆羡之後又遇一主政主政亦保定人也余又訊二公政主政曰二公清約之節同仁愛之心同明敏之材同但吳公若有天授不可及者余曰云何曰吳公為政未嘗用意摘奸剔弊而内之胥史𨽻卒外之市猾田甿若皆貫通於吳公之心而更無一作奸犯科者吾不知吳公何以至此也予為之慨然嘆羡者乆之盖其誠能動物矣黄憲副公卷初官比部出補山西僉憲晉陜西少叅已晉憲副即解紱歸歸年才四十又五耳公歸盖即真眀農云春夏間家衆悉驅之田作而獨與其配操杵臼炊釡作飲食躬荷而饁之嘗假農具鄰舎鄰舎子欲舁送之公曰毋此何時也假我具即徳厚矣奈何又妨汝務遂自肩之如田焉公性故孤介悃愊而逸興甚豪嬰情山水間域中山嶠水涘靡不遊至或乘敝輿或䇿欵段或曳杖躡蹻翛然咏嘯飄飄若仙焉家去城邑四十里而近經嵗不一至至則市童撫掌歡呼相指曰黄公來也盖識其輿敝陋云公居常好客客至座已徐起臨庖服犢鼻衣治具具無兼味治畢乃盥手更衣出即新婣上客率以為常余一日偕元孚周進士候公公歡甚縱談名理因及疆塲時事奮然有請纓之志移日不輟已有婢從屏間稟曰烹雞熟矣請割公曰少需盖劇談方􅆘無間也有頃婢稟如初公又曰少需如是者三而公談益劇乃命婢曰汝姑自割既共饌出胾肋狼籍不為意也公間起入室余從之闞其室一榻蕭然不啻僧舎已余時若泠然嘘以清風洒然沃以瓊漿也退謂元孚曰吾與子今幸游羲皇世矣相與嗟嘆不置云耿子曰夫世約其躬為苦節行者𩔖多齷齪迂滯不能事事彼盖矯飾為名髙者也其真漓其性牿矣公率性之真從心之安孟子所謂人有不為可與有為者非乎藉令世誠重用之請纓之志計能酧賞不虚也余又嘗聞里中前軰若鄒劉周李董阮諸公其風軌大都如是顧所及覩記者惟公因憶父老相傳宣正成𢎞間里中民物殷盛閭巷熈熈有以也乃今里中身有完服靣無菜色父子兄弟相聚而無愁嘆聲者盖鮮曷故哉吏治之日媮也吏治之日媮則士節之不立也士節之不立則古道之寖㣲而紛華之為蔀甚也即吾一鄉而天下可𩔖知己嗟嗟孰謂公履為細謹哉盖古道之碩果矣余兹重有慨焉爰拾公一二淺事為外傳云徐主政公九思為句容令其政專主養民自身及僚屬上吏供一切裁省行之三年上吏猶數撓之屹然不以撼也至六年乃定九年遷去邑舊有二簿一典糧一典馬糧簿嵗啓倉有例金八百四百以啖糧判四百簿自取公聞遂躬往主収判簿不得取例金焉馬簿嵗視馬馬九百餘匹匹例一金公亦自往視焉例金遂絶邑舊募民兵四百毎兵十金公両分之歳更畨募止二百一嵗省金二千邑當吳越之衝民疲于供公令官厫養鵝雞官池魚閒地圃之賔至取供一不煩里甲歳自碎小而上數之省者胡啻萬計其養民如此右胡正甫為余言余聞公嘗語人曰吾昔筮仕之句曲也甫入境邑中蒸黎繮屬遮道迎我漸邇郊坰迎者漸夥􅟡􅟡詵詵無慮千萬計或趨前導我或擁後衞我更畨輿我也奉我堂上敷座坐我座已是千萬人者擁伏墀下無問倪旄聲閧閧僉曰爺曰爺吾時悚然内省曰嗟嗟是千萬人者均之圓首方趾横目噉吻我無以異也即皤皤黄耉亦相率而呼我曰爺曰爺彼盖謂我為父母云爾也若何施而乃能當兹父母稱哉為之惕息深念者累夕云吁徐公之感念若此此所以汲汲于養民之政而九年如一日也嗣陞任司空郎解紱㡬年矣甲子嵗余督學駐句曲誤謂公已捐館舎檄趣祀之名宦祠維時境内蒸黎聞之歡呼奔趨環而拜伏祠下者亦千萬計猶初任登堂日也到今戴之真不啻父母矣公之得民若此盖感于此一念云顧今宇内受符為令者其入境時蒸黎依依之状想亦覩若此目覩之而悚然念者㡬人哉又余嘗喋喋述公是語與筮仕者道耳之而悚然者可指數豈其目其耳人人殊哉未之思耳誠思之人人有同然者在也子貞明辛未進士尚寳寺卿胡公夀安初任信陽調獲鹿永樂中任新繁在官未嘗肉食其子自徽來省居一月烹二雞胡怒曰飲食之人則人賤之矣吾居官二十餘年嘗以奢侈為戒猶恐弗能令終爾好大嚼如此不為吾累乎胡三宰大邑不携妻子之任或誚之胡笑曰吾豈無糟糠之念嘗於是思之熟矣吾軰讀聖賢書論居官治民之法孰不欲砥礪名節哉及登仕路以耳目玩好聲色之物喪生平之守者多矣矧婦人小子尤易惑也以是計之故不欲妻子之為累耳附余里詹太守瑩守漳州府已陞長蘆塩運使皆脂膏地也清操皭然居常麥粥竟月無肉食每飯茹塩耳致政歸子養饌間以肥脆進公怒推案曰何暴殄若此女適劉荘襄少子公貼書戒之今手筆尚存諄諄以崇儉為教殺生為戒中言已宦所朝夕惟麥饘以塩㸃之而已後子孫多食貧鄉人無識者或殷殷姍公為拙今其孫淑舉湖廣乙酉鄉試稍足為清白吏增氣云少宰陶文懿公大臨余同門同年也第進士鼎甲官翰林嗣為今上講官累遷至少宰資望將柄用而卒公官翰林時曽以差出京便過家歸省㝷還朝一日晤余慨然太息曰吾儕一列仕籍即令念念濟人利物日行其徳一生罪業不能贖掩萬一况吾官此閒局雖名清華未得親民將何修而可余曰云何公曰憶余往以差出京由京泝越寧家已由家自越還朝報命往還凡㡬千里或由陸而輿所用負載役夫不知若干人或由水而舟所用牽挽役夫不知若干人念兹菜色枵腹之甿鶉衣裹體之黎彭彭林林皆亦人子也或當炎蒸淋汗如雨喘息若雷或值嚴寒䟤跋淖濘衝冒風雪由此而踣頓道路委填溝壑者何可數也此等罪業皆由我作如竺氏果報之說不誣能無惕然乎余聆亦為之悚然者累日中心識之不忘今公倘得柄用推此一念天下必多食其福者惜夫傅司馬公希摯亦余同門同年也公歴官素厲氷蘗囊無餘貲家世以力産作業務農重榖廩粟頗有餘饒值里中嵗饑榖價騰貴公傾廩减價出糶以賑之計所糶粟得若十金止留半以分諸子餘復悉以賑里人焉惟公故與馮璫保者同里閈公督撫山東時保權寵最盛􅁄欲交公相引重求公一識靣而不得因銜之摭他事擠公落職歸保敗以薦起累官大司馬云惟公不屑意與里中之權璫交而顧篤意于里中之餓殍念是可以觀公矣或曰公所出糶粟乃厥考所積也非公所自積也其所留金以遺諸子者亦約矣嘻推厥考之積以仁其里兹所謂善承考者哉以此仁聲遺子孫所遺子孫者不既多耶耿大司徒公定向早聞道言論動履一率真性而軌古人初由大行拜御史巡按甘肅未期年推督南畿學闗中故多古書刻御史得代行藩臬往往舁數篋送之境上公於書雅所好然不欲以篋笥煩輿夫乃曰吾入闗原三扛出亦宜如是耳他書付還収十三經石刻一部覽數日竟留洛陽以賂洛中諸士子有司刻石記其事在御史臺壁間余故聞其語頃按洛睹是石因嘆此風今何可復見焉公督南畿學五年得士甚盛士入長安多持䞇来見公公他物無所受獨受書即書中有緘金亦令去金而受之邸中書積與廩齊人頗疑訝一日公得差當出都盡以書送諸知交為作别不携一冊還也都門縉紳往来率循故事受謁紿人以為常公戒門者毋紿人故知或同志有相論議者在即入白不在直以故謁公門者人人能亮公不相疑一日余造公公方飯門者傳刺入公旋出且行且衣帶揖而就坐僮捧一盂茶上公公飲之曰飯己未𠻳口故先君耳公事事有先進風不直此即此數者亦何可多見於晚近世哉余故増而入之王符卿公汝訓余嘗與一再晤視其人冲夷恬雅竊疑必充養有道者因夷考其履諗家世素饒於貲足侔素封乃父封公尤善綜理毎晨起握籌課算計盈縮或至日昃未食貲以是日裕故鄉居時虞盜患毎至夜分則募數十人居守重鍵固鐍惴惴為意外防竟夕或不能安寢也符卿家食時即志聖賢之學覩其然深念之食寢亦不自安因諭其父曰天之生財以養人也人之理財以自養也世之切於人者莫重於身至切於身者又莫重於心也大人為此衊衊者朝營營然暮兢兢然内累其心外累其身何為者哉古誚厚積者曰守財虜自今觀之不虗也兒即至愚不肖不能顯揚大人安忍大人墮此𩔖哉封公喻一日盡招其族里諗諸夙貸而負者悉裂券免之夙所積藏視戚屬族黨之殺差貧富之等而悉捐以散給之里之人大恱徙而相依者數百家所居遂成聚無煩募人防守而符卿因益得肆力於學卒成進士雅望軒軒起士林推重至今其鄉號稱仁里而戴其封君為仁人君子曰符卿純孝哉以其親顯者至矣噫亦其達如是也李公謙值歲􅂽出粟千石以貸鄉人明年又荒人無以償公即對衆焚券曰不須復償及嵗熟人争償之一無所受後復大荒公仍竭家貲煑粥濟之賴全活者以萬計死者復為瘞之人咸曰公隂徳可謂大矣一日夣紫衣人告曰上帝知汝有隂徳報在汝後言訖而去後謙百嵗而終子孫位皆通顯先進遺風卷下
