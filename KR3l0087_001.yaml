body:
  text: 先進遺風卷上明耿定向撰毛在增補學士宋文憲公濓公嘗曰古人為學使心正身修措之行事俯仰無愧而已繁辭復說道之蔽也尤篤於倫品與人交和易任真內誠外恕一見信服汲引後學如恐不及平居布衣疏食無異貧士或勸為子孫計曰富貴一家物哉我乃所以遺之也自少至老未嘗一時去書致仕居青蘿山閉門纂述人不見其面權要索文者非其人雖置金滿槖一字不與縱與之亦不受餽日本使奉敕請文以百金為獻公郤不受上以問公公對曰天朝侍從之臣而受小夷金非所以崇國體也參政陶姑孰郡公安上與儒臣論學術公對曰道之不明邪說害之也上曰邪說害道猶美色眩目鮮不為惑自非豪傑不能决去夫邪說不去則正道不興正道不興天下烏得而治公頓首曰主誠探本至論惟公當天造矢謨首以正學術為主而髙皇都俞重懲邪說之為惑伏覩教民榜崇正息邪赫然不顯矣毋亦公啓之耶宋學士稱說古人學術必證之心身行事先進之學術可覩已楊文貞公士竒以元宰歸省過湖中邂逅一張參政者風駛舟上下則各舉手一笑竟别抵維揚郡守令先日候無耗翊日舟至守令竟不相聞過去訪友人則相與聨寢語逹旦自常廩外無别供鄉人得以隻雞束薪相辭受其細如此其大可知也豫因是又知當時上下省事殫力民務而化國日長矣豫觀文貞為此良有本文貞雅言天下事當以天下萬世心處之嗟夫末世之有天下萬世之心者誰哉見胡子衡廬稿公正統初每朝罷歸邸或正襟危坐長吁不已或獨倚䦨立或月下閒行通夕不寐夫人問其故不答一日早朝回欣然喜動顔色夫人問曰每朝回多憂今獨喜何也曰主少國疑擔荷重任懼不克勝故多憂今早見上聰明已能覽章奏决事重任可釋矣先輩憂喜一係國事如此見灼艾集李文逹賢入仕初公以不識為歉南陽守公友也邀之往見文達不可曰素無識而造門是求知也士夫兩賢之楊文敏公榮天台魯中丞穆登進士後還鄉杜門讀書絶跡謁請嗣戒行還京有司具腆贐贈之固辭弗受或曰行以贐禮也奈何拒之魯公曰筮仕之始未有分毫益於鄉里而先厲之忍乎嗣拜監察御史尋擢福建僉事摧抑豪右無所顧避文敏時執政家人有犯者亦不少貸文敏以為賢特薦于宣廟遂拜僉都御史魯公歷仕二十餘年家無餘資被服如寒士卒之日家無以殮賴諸公卿賻始克襄事跡公終始若此於文敏之知可謂亡負矣論曰魯公初第時即不忍厲其梓里如此其衷篤其識逺哉嗣劉忠宣發解時臺司檄有司佐贐公念里中阻饑懇辭之心與魯公同窮視其所不取逹可知已魯公僉閩臬時法繩執政之家亦不少貸剛正不阿其自立者素也乃文敏故以為賢特薦之宣廟此與文定之薦范令同達視其所舉前輩之為國為民無以有已如此按魯范兩公皆天台人人謂台人多峥嶸有節槩其風自昔已然耶挽近世俗子一離黌序希覬有司如責償夙負然既列膴仕其媚權貴如脂韋然識趣若此世何賴焉楊文定公溥執政時其子自鄉來省至京邸公問曰一路守令聞孰賢其子曰兒道出江陵其令殊不賢曰云何曰即待兒茍簡甚矣乃天台范理也文定默識之即薦升德安府知府甚有惠政民到今頌之再擢為貴州左布政使或勸范當致書謝范公曰宰相為朝廷用人非私理也何謝竟不致一書逮後文定卒乃祭而哭之以謝知己云程襄毅信公一見而竒之與論人品確有定見曰逺到器也薦為吏科給事中卒為名臣憲副劉公仁宅華容人忠宣公父也永樂庚子貢士初仕為瑞昌令同邑人嚴某令高安同入覲文定遣一價往瞷之價還白公曰嚴丈富貴雅稱官也劉丈藁席布被瓦盆煤竈猶然窮人耳公心識之劉與嚴皆公鄰邑人且有㜕嚴賣劉特先見贄以幣公麾之劉嗣見具茗一袋蜜一缶耳公嘉納尋擢為御史劉公為御史時六七人共一馬更迭出入常與同僚約過除嵗各具一肉一蔬或具肉二豆酒一壺同僚甚訝其奢公出所有惟一枯魚而已後升廣西憲副歸囊惟七金云正統庚申文定以展墓歸里劉公時為御史在京公還朝過華容便造焉問忠宣曰汝父在否曰在道中未回曰汝母安在曰適鄰家磨麵去矣乃起遍視家中所有遂引忠宣詣寢室見牀上惟蒲席布被褥喜曰所操若是可稱御史之職矣既去劉公回忠宣白其事劉公曰此必鄉先生楊少保也其為人縝密故觀人於所忽若此右忠宣為蕭僉憲聰言見夢醒録蕭僉憲河南新野人按文敏過華容忠宣時尚齔夢醒録曰噫今有官侍御而蒲席布被褥者乎其妻有躬操井臼以為養者乎惟昔東漢王良為大司徒布被瓦器司徒史鮑恢以事過其家良妻布裙曳柴從田中歸事類此蓋嘗嘆世之為官者其行誼日薄一日其受用日豐一日其聲價日損一日其勢焰日張一日而民生則日憔悴一日豈不悲哉余按李文正著劉公狀述劉公令瑞昌其平亂功甚巨惠洽於民甚深人有不為也而後可與有為信哉文定初遣僕偵公于旅邸嗣過家又瞷之維時廟堂上急於知人也如此舉措如此吏治蒸蒸民生熙熙有以也附余里莊襄劉公天和任三邉總制時差健卒取其孤孫暨一孤姪來任所撫之比至華州其僕夫偶箠門役門役膚訴於州守州守怒弗為禮封鎖其門即薪米不供二孤至饑渴甚不得已令從者踰垣竊出乞食於素所知交家微行去州守隨投牒公所備陳從僕虐門役狀二孤既抵任所環公夫人前泣訴途中為守所苦云云夫人心憐甚嗣州守以事謁制府家衆跂足側窺計公必督過守已乃公故禮遇之有加後復特薦其賢能於朝余里劉端簡公采任右司馬時余同年尚德恆氏為麻邑令故亷直不避貴勢公姻里多不恱在京日譛於公所余一日謁公意為解之以同年故嫌於出口囁嚅不能盡詞公曰然吾故知尚令必潔亷人也不待公言何以知其然凡人有欲則不剛即尚令君之懲治吾家諸僕更不少貸其操可知已余嘆公明决而能自克若此時時述為諸公卿道之意凡為鄉縉紳者胥識此意庶牧民者得展布云論曰國家張官置吏凡以安民也吾儕誦詩讀書師法孔孟將以究安民之術也一旦躋膴仕或進據郡縣之上或退居閭左之間惟恱牧民者之曲意㣘我骩法庇我而於斯民之瘼若蔑聞者則上負國家自負所學亦甚矣省夫楊文懿公守陳以洗馬乞假覲省行次一驛其丞不知其為何官公與之坐而抗禮卒然問曰公職洗馬日洗幾馬公漫應曰勤則多洗懶則少洗無定數也俄而報一御史且至丞乃促令讓上舍處之公曰此固宜然待其至而讓未晚也比御史至則公門人也跽而起居丞乃睨御史不見蒲伏階下百狀乞憐公卒亦不較歸則讀書田間不輕謁官府時陸司寇卒有御史過而不弔也公欲警之於其來謁令閽人辭曰適聞弔陸尚書先至彼以候以故失迓御史旋復詣陸先令其子主事君至彼辭曰家大人遲公良久不至乃歸其人頗慚公偉才髙第藻詞淵學藝林推為雄長而介潔自持未嘗干求恩澤為翰林五品者十有六年而不調權幸有欲引之者使所親諭意公語所知曰吾猶嫠婦也茹荼積久乃以白首改節耶濡遲散秩竟以三品終見張東沙芝園集黎文僖公淳公素儉朴患鄉俗好侈躬自裁抑倡之㛰葬飲宴之禮人多視以為則重倫尚節痛違祿養極嚴廟祀兄嫂卒其子及女皆幼育為己子嘗歸省至臨清適山東按察副使董國器妻死而董使未還特使人舁其柩以歸太常卿余孟亨卒家貧不能舉葬公倡同鄉士紳合賻襄其事鄉吏鄧祿寓銀數十兩後祿死藏所寓物候其子長還之所居黃洋渡積潦病涉捐私帑築堤四十丈民到今利焉訓諸生日亹亹不倦登甲科仕中外者相接踵下逮胥吏有嚮學者輒優給之後亦多成名云惟公風致若敦朴醇厚長者乃主順天場試事時有試卷竒甚後場不類疑有弊勾稽墨卷得謄録截卷奸狀按其事而取是卷為解首則名士馬中錫也其精明又若此公能盡職殫心耳此弊聞時益多所從來矣李文正公東陽幼負俊才藉有清譽藝林推為神駿雲路比之祥鸞其推轂天下士孜孜如不及也其為相也㑹逆豎劉瑾亂政毒螫縉紳公委曲周旋多所全濟衆頗賴之蓋瑾竊太阿之柄大肆憑陵目中已無天子獨公以素望稍加欽重其清約之操出自性成冬月不爐披册操觚不勝其栗輒就日而暴之日移亦移其儉如此余家尚書邦竒公門人也一日侍坐有興化守者亦公門下士以覲事至京緘兩帕四扇令從吏饋公公曰扇以染翰固可但多帕奈何吏頓首于庭乃啓緘取扇而歸其帕云即此一事古風可想已見張東沙芝園集公致政後邃菴楊閣老載酒肴過懷麓堂為壽觴以金公訝曰公近亦有此器耶邃菴有慚色自是不敢用以觴云附趙司成永號類菴京師人一日過魯學士鐸邸魯公曰公何之司成曰憶今日為西涯先生誕辰將往壽也魯公曰吾當與公偕公以何為贄司成曰帕二方也魯公曰吾贄亦應如之入啓笥索帕無有躊躇良久憶里中曾餽有枯魚令家人取之家人報已食僅存其半魯公度家無它物即以其半載與趙公俱往公所稱祝公烹魚沽酒以飲二公歡甚即事倡和而罷右聞諸都人劉憲副效祖者劉耳承之趙司成云趙司成亦都人與魯公皆公門人也耿子曰公仕宦五十餘年柄國且十有八年矣鄭端簡謂公卒之日不能治喪門人故吏醵金錢賻之乃克葬又謂嘗過其門蕭然四壁不足當分宜輩一宴之費云云則公平生所以禔身者可知已彼時權璫狂猘公卿鮮不受其螫者而卒不敢有加于公公豈有權術牢籠之哉毋亦貞操潔履有以服其心耶羅文恭述楊文襄一清為相時有人餽美珠一斗者公直受之嗣諸邉將謁請留侍左右詢邉事公隨出所受珠分勞之投之地頃刻立盡門生有以貧歸者發囊助給率數十百金以為常蓋以天下財為天下用而不為私蓄即比於一介不取可也近楊太宰述徐文貞公為相時亦常捐千金為邉將紓禍意亦若此昔寇萊公出入將相終身不蓄財産無聲色之娛寢處一青幃二十餘年時有破壞則命補葺自入官所得俸祿賞賜金帛惟務施與史所謂內儉外奢如此古人肩巨任重志在國家者大都然耶余嘗尚論楊文簡躬清儉郭令公减聲妓評唐之相業者未可以是為低昻韓魏公有玉盞司馬溫公無茶具評宋之相業者未可以是較優劣視其所存所樹何如耳昔人云平仲儉矣夷吾則奢均為齊良已若由今之世維今之風與其奢也寧儉劉忠宣公大夏成𢎞間多碩人粹然皭然足稱古純臣者公是已公生而岐嶷頴敏楊文定一見目為國器髫年從父憲副公任父按部歸履新靴公疑出時無是即以請父示為餘廩易者乃釋門者手一銀釧遺公公引付父所善大參某所詰其從來跡維時識趣若此介其性成耶甫弱冠發解臺司檄有司佐贐公念里中阻饑固辭謝焉已成進士選讀中祕懇願外補習民事執政嘉之既授諌垣以親在辭乃授兵部主事已為職方郎時警報旁午調發戰守諸巨務尚書余子俊悉倚公畫才望燀著時權璫用事適兵侍缺欲援之超補尚書亦喜得公助已數趣之造謁且擬助之贄公固辭謂福薄不敢承久之以資擬晉坰卿公又以志在親民為言乃出參閩藩其恬於進也如此泰陵初立廷臣奉詔薦公升督撫嗣祇以常調轉廣東右轄已轉浙江左轄揚歷藩司凡九年始以河患晉副都御史踰三年晉戶侍理餉雲中還即三疏乞休已乃起嶺南大制帥召為大司馬無何泰陵升遐武宗嗣政在權璫遂乞骸歸歸三年而劉瑾之難作先是理河事竣餘工費二千金瀕行藩臬舉為公贐公令籍之府帑被逮經汴二司擬以遺瑾公曰此寧能飫彼意第舉殘骸畀之耳繫詔獄將甘心焉同難者謀行賄紓禍子姓丐貸四方知舊擬醵金公曰如此而死拚一身耳如此免死則纍一生且纍子孫矣賴屠中丞得减死戍肅州行時故人贈遺悉謝絶止受同年李文正一羊裘至肅無資諸司憚瑾毋敢館榖三學生徒輪食之有總戎某公所舉者遺百金曰患難中非復在位時公曰不聞語云及其老也戒之在得乎參將某遣使致餽敕其使不受亡返公曰吾老惟一僕日食不過數錢若受此僕竊之逃不將隻身陷此耶尋同戍鍾尚書槖資果為僕竊而逃人服公先識云公自髫至老即患難顛沛中介節不渝若此自理餉得請歸預為壽藏紀其生平履歷嵗月刻石載歸遺言子孫毋丐名人撰志銘毋援例求恩澤公蓋不獨生忘榮利身後名寵亦忘之矣公嘗曰居官以正已為先所謂正已不特戒利亦當逺名不虛耶任職方時匿故牘寢交南之用兵權璫汪直獻取安南䇿以中㫖索永樂中調軍數公匿其籍謂司馬曰此䇿行死者何可萬計國􅍺民命所係也事乃寢陳形勢阻朝鮮之改貢道朝鮮使請改貢道朝議將許蓋有中官為之地者公陳先朝迂道之深意乃止其慮逺其識卓矣參閩經略海防分寨造艦建廩計餉政至今垂焉轄廣東以恩信撫諭田州叛不煩一旅繼平後山寇下生擒令不妄殺一人公即經武亦仁心為質耳在越提調棘圍忽遭水沴士人大譁公權宜聽其出留譁乃戢且得士為盛隨機應卒智亦圓矣河决張秋公身親量度疏上流以分水勢築長堤以捍橫流五旬而告成功督餉雲中行收市法糧草少亦報中權貴不得把持公所至著績隨事奏功其通才哉抑有此純心也晚遇泰陵心膂是寄帷幄疇咨如謂去塞劫敵之非䇿謂兩廣鐸木香料之耗材謂漕運京操之纍軍謂事由閣部大臣則權不旁落謂以揭帖論事則弊踵墨敕斜封議汰騰驤四衛之冒充議省光祿之冗費議革中貴鎮守之蠧害閔司寇讞獄忤旨救解之王文莊才堪大用亟薦之李本緣外戚干大帥力格其傳奉魯麟挾部落要驟遷䇿任其還部造膝矢謨詳具宣召録者無非宗社之至計經國之逺猷也惟公故無奧援第此朴忠蒙兹特眷同僚之􅀈言宫門之飛語咸能鍳之黃髮詢兹魚水孚契泰陵真聖主哉公自戶侍豫告歸搆草堂於先壟之次讀書其中作東山賦以見志平生不為人通私書請託藩臬守令往造者不謁謝薄田僅足供衣食里鄰或肆侵奪任弗與爭嘗有李某併其世産族人走書告公公署其尾曰昔詹尚書家亦有是詹報家人詩曰四鄰侵我我從伊畢竟須思未有時試上含光殿基望秋風秋草正離離我雖不及古人望爾輩弗為詹氏子孫也公言財貨惟務農服賈凡力得者獲用其餘易致之物終非己有子孫視之亦不慎惜况官貨悖入者乎後起大司馬歸仍居草堂再著東山後賦戴笠乘驢往來山水間於始祖塋次作敦本堂嵗舉二祭祭畢有燕以合族人為家規誦於燕所訓之族人貧不能存死不能葬長而不能嫁娶者皆有賙值嵗侵族阻饑鬻玉帶買榖賑之常欲效范文正置義田以無資未就公居鄉忍讓敦睦類若此惟公轄廣東時常乘小艇訪白沙白沙問其學曰豫存心之功十九致知之功十一公之建𣗳良有本哉又聞公語陸吉士曰仕途不可廣交受人知只如朋友若三數人得力者自可了一生惟公朝著之交如李文正張簡肅戴恭簡山林之交如陳白沙李大涯輩真可了一生耶吳司空廷舉云憂民如有病對客若無官公之謂也李文正謂公與物無忤臨事有為林司寇俊稱公清約如知白先憂如希文公望如彥國能處大事如子明確評哉于肅愍公謙被害時籍其家無長物惟上賜盔甲袍帶未幾代公尚書陳汝言敗上曰于謙囊槖磬懸汝言贓穢山積賢否相去奚啻天淵石亨􅊣公者從旁聽上言低頭大慚秦襄毅公紘被逮時上命太監尚亨籍其家止得黃絹一匹故衣數事亨還言公貧狀上親閲其資嘉嘆良久立釋公且賜鈔萬貫旌其亷劉忠宣宣召時户侍劉宇覬柄用泰陵鑒識其人曰某小人也而某故恨公不為己地又童閹有伏綴衣後泄公革鎮守語者中貴亦恨之某尋附瑾得入政府嗾瑾曰籍劉尚書家可得幾萬金瑾因托岑濬事矯制逮公屬官校羅某闞公資産羅至亷知公貧餽之以酒器固辭不受惟索詩一律載之論曰凡貨賄未有悖入不悖出者三公以籍沒益顯其亷先識此耳俾分宜輩蚤能識此奚肯以身為溝壑以家為縣家外府藏蝎囊虺以自毒害其子孫哉當代明主亦不蔑視天下士矣悲夫識不蚤也章文懿公懋公任翰林時朝廷舉張燈故事命下詞臣詠詩公率同官莊昶黃仲昭援蘇長公疏意直諌忤㫖左遷尋升僉事年未及艾即力辭官歸力田自給四方學者雲從家貧刈蔬脫粟而餉之或諷為文章曰弗暇或請著述曰儒先之言至矣盡矣刪其繁蕪可也𢎞治中薦起為南監祭酒以母喪力辭詔增設司業㕔以居終制赴官世廟初進南禮部尚書致仕公嘗謂門人董遵曰待客之禮當存古意今人多以酒食相尚非也聞薛文清公居家留客止用以雞黍盛以瓦器酒三行就飯而罷又魏文靖公居家客至必留飯止一肉一菜雖不之公府必回訪舟次有所相遺必答禮不虛受人惠此二公可法云附太宰漁石唐公致政家居時出入惟徒步有陳大參良謨者說之曰翁官居八座年邁七旬故天下大老也孔子曰吾從大夫之後不可徒行翁學孔子者而顧欲過之耶公曰固然第吾楓山先師致政歸祗是步行未嘗乘轎乃姪朴菴公名拯侍郎及竹澗潘公希曽侍郎俱守此禮吾安敢違耶吁浙有楓山殆猶魯有岱嶽其遺矩所留諸公皆率履弗越如此論曰楊仲修誚公諌燈火非是謂詞臣職當應制中含納約如孟子告君意可也此說良是又公以玉堂蔬圃詩中秋賞月詩忤時相想公不欲以辭賦名家亦少時意氣激昻如是顧公德業問望焜耀士林流風懿範孚洽閭里跡巨公名卿率其遺軌不敢違越若此豈可以言諭色取哉嘗聞其教學者謂心胸欲大必有窮理工夫心才㑹大又須心小必有涵養工夫心才㑹小云云晚蓋進於道矣不直以一諌燈火一忤相臣揭揭表樹已也且跡其難進易退真有塵視軒冕槩矣附論唐公以高年太宰徒步里中陳大參執孔子從大夫之後不可徒行語誚之亦是顧公以前輩風軌謹守不渝長厚哉後吳文定寬朱恭靖希周俱以清華位至崇膴其居里第也亦多儉約魚魚雅雅如一庠士古所謂鞠躬君子固不事澆薄矣王莊毅紘李襄敏秉俱以尚書懸車在里王公抗志寡交非其人不與李公出入閭巷每與市人對奕終日無忤王規李曰朝廷大臣而與閭巷小人戲狎何自輕之甚李曰所謂大臣豈能常為之朝野固自不同何至以官驕鄉人哉意見不同如此余惟夫子之在鄉黨所謂恂恂如者想無容亦無狎也羅文毅公倫性慷慨樂善不疑人欺自少勵志聖賢之學嘗曰舉業非能壞人人自壞之耳郡守嘉其學行而憐其貧命邑令周之謝弗受成化丙戍廷對幾萬言指切時弊拳拳以格君務學為說中稱引程正叔親賢士大夫之時多親宦官宫妾之時少語執政欲節其下句不從賜及第授官修撰後㑹大學士李賢邅喪去朝廷留之公詣其第告以不可踰數日歷陳起復非是援宋富弼及劉珙故事疏奏忤㫖落職提舉泉州市舶明年商文毅相召復原官尋改南京聞白沙陳先生緒論慕之以疾辭歸時與來往居金牛山山有洞名曰太𤣥結茅以居取給于隴畞往來共樵牧受徒講學以注經為業若無意於世者嘗欲倣古置義田贍族或助之堂食錢弗受一日訪友值嚴寒衣單縷凍不可忍入其書室擁衾而坐友人知解衣衣之行遇乞人僵於途輒解以覆之去客晨至留飯妻語其子曰瓶粟罄矣之鄰舍干之比舉火日已近午亦曠然不以為意生平不視惡色不聽惡聲不耻惡衣惡食與人子言依于孝與人臣言依于忠與居官者言言民疾苦見一饑寒凍餒之人則傾家所有以賑之大率義之所在毅然必為人之毁譽欣戚事之成敗利鈍已之死生禍福皆所不顧云嘗讀崔文敏銑洹詞詆公論文逹起復非是或亦自有見顧謂公忮此人登相云云則淺之乎知公矣何不跡公生平終始觀之也浚川云充公之操行一不義殺一不辜而得天下不為者確論哉余聞公及第初嘗與叔父書曰所謂好子弟者非好田宅好衣服好官爵一時誇耀閭里爾也謂有好名節與日月爭光與山嶽爭重與天壤爭久云此可觀所志矣顧歸而依依白沙先生時與游處乃白沙之學以致虛為宗以自得為至者而亦眷眷於公何哉蓋斯道之任重詣極須得剛毅如公而乃可與立也嘗誦白沙咏太𤣥洞什云太𤣥在何許乃在金鰲麓繡壁不可援丹房我當宿洞門俯深幽來者秉明燭呼童烹金鰲膏此千丈木所以效偲切於公者殷殷矣公之日進於髙明有以也慨挽近世抗節厲行者類視談性命為虛罔是所謂劵外而內揵也而志性命學者又類以名節為賈費則所謂外揵而內韄矣皆非也甚者裂維蕩矩忘亷耻而忍謑詬是則何足與議哉吳文定公寬歷官翰林坊詹侍康陵東宫宫中侍豎不欲太子近儒臣數移事間講讀公率宫僚上疏諌詳實録𢎞治十七年集議孝肅太后祔葬廟禮廷臣皆是公言定議上喜謂大義深恩並行不悖云詳實録公為人靜重醇實無慨慷激烈之行而能以正自持遇有不可未嘗碌碌茍隨好古力學至老不倦於權勢榮利則退避如畏又篤厚倫誼未第時嘗讓貢於其友同年賀解元遘疾京師歸其家朝夕視之死為服一月喪其篤友誼如此既官尚書歸至里第步行未嘗乘輿謝文正公遷初入翰林有御史驟升都憲臺中循例丐公言為賀文公諗其人素不為公議所與竟辭不作王文恪公鏊公初授翰林閉門力學避逺權勢𢎞治中充經筵講官中官李廣怙寵干政公進講意存諷諌上退謂左右曰講官云云意指若曹也後廣敗大臣多被汚公獨不與戚畹壽寧侯與公有㜕絶不與通歲時問遺輒麾去或以為過公曰昔萬循吉攀附昭德吾嘗耻之乃今自附夀寧耶鄒立齊公智年十六發解蜀省迎宴日閭巷覩者藉藉嘆羡公馬上占絶句云龍泉山下一書生偶占三巴第一名世上許多難了事市兒何用喜相驚比上春官時鄉里一尊官見而欣羡之謂曰某省一解元與子相若可以訪否尊官蓋俗輩第羡其均以妙齡掇巍科云爾公初以其為同志也亟訪之才晤坐已其人忽問曰子省榜首坊金視衆舉子為增幾何公大恚即拂衣起不答而出吁燕雀安知鴻鵠志也昔人謂王孝先曰狀元試三場一生喫著不盡孝先艴然曰平生志不在溫飽類此公既第選館中祕應詔陳言論進君子退小人大忤權貴謫某州吏目公年雖不永未竟所志其閎議偉節到今煥然烈矣朱恭靖公希周公仕至南冢宰歸里吳中市貨溢衢紛華滿耳入公之室蕭然如村落中見野翁環堵出與賔客逰魚魚雅雅宛然一邑庠中舊時弟子後生間有小不檢則相戒曰恐朱先生知也新建伯文成王先生守仁今制刑部有提牢㕔置獄吏若干員典守獄囚月更一主政總其事凡囚自大辟以下繫獄中者日給糧飯之往獄吏相沿取囚飯餘豢豕豕肥則屠之分食先是堂卿或未之知故亦無禁也先生筮仕刑曹適輪提牢覩諸吏豢豕惻然恚曰夫囚以罪繫者猶然飯之此朝廷好生浩蕩恩也若曹乃取以豢豕是率獸食人食矣如朝廷德意何欲督過之羣吏跪伏請寬且諉曰相沿例也亦堂卿所知先生曰豈有是哉汝曹援堂卿以自文耳即日白堂卿堂卿是其議先生遂令屠豕割以分給諸囚獄吏到今不復豢豕云先生晚年在告家居同里有官刑部主政管姓者習其事一日侍先生喟然咨嘆曰先生平生經世事功亡論諸掀揭之大即筮仕刑部時屠豕一事至今膾炙人口云先生聞已顰蹙曰此余少年不學作此欺天罔人事也兹聞之尚有餘慙子乃以為美談諛我耶管不逹曰上宣朝廷之德惠下軫囹圄之罪人本至德事也先生顧深悔之以為罪過何也先生復蹙然曰比時憑一時意見揭揭然為此置堂卿於何地耶只此便不仁矣右在此臺時聞臺長趙麟陽先生為語此嗣余二刑曹時舉以語同志友符卿孟秋氏問曰然則豕當終不屠耶余曰藉令先生知學後處此必微婉默運令發自堂卿不使善歸已過歸人矣先生家居時里人有求鬻其産者先生辭郤已一日先生偕董從吾王汝止諸門弟遊山偶經其處覩其風景佳勝衷默悔前之未收也忽惕然內訟曰是何心哉有貪心便無恕心矣且悔且訟兩念交戰膺中行里許始化徐以告從行諸弟曰克己之難如此云右見董蘿石語録僕固陋平生篤信文成良知之學者類此粗淺事耳竊謂由前創悔屠豕一事推之實自致其知則進之立朝必不忍為釣竒賈名事矣由後省訟鬻産一事推之實自致其知則退之居鄉必不忍為侵人自殖事矣只此修持雖不能為出世佛住世仙庶亦不為世蠧也自分如此而已附論嘗聞先生教指有曰無善無惡者心之體有善有惡者意之動知善知惡是良知為善去惡是格物云由是以觀先生初與諸弟偕遊也載歌載咏熙然陶然維時心體何善何惡也見景而意動曰貪曰恕善惡分矣省而克克而化先生之致知格物如此此即顔子之有不善未嘗不知知之未嘗復行也彼意動不知省竟成其貪者此下流冥頑亡論已即賢而砥修者或亦知訟而改顧意未動之前念既化之後此間光景不知能體取否於此錯過終無歸根處正在名義上檢察耳非不逺之復也乃今有勦傳先生宗㫖者曰心無善惡意亦無善惡知亦無善惡物亦無善惡云云是上乘法至謂見景即動既動即為者為見性而以訟悔為輪回以遷改為拙鈍此則淫詖之極傷風敗教尤甚有世道之責者謂何余里中郭孝亷慶字善甫者敦朴篤行人也從先生遊最久既歸則以其聞諸先生者接引里中後生里有茂才吳良吉字仲修性資視孝亷頗高明因發志鬻産為資附孝亷舟偕往越中謁先生行將抵越孝亷一夕大憤悱中夜呼吳生語曰吾夜來自省胞中尚有俗念如許如此夾雜心安能領受先生教耶拊心痛自刻責不已徐質吳生曰不時自省如何吳對曰此來一志惟求教益更何俗念孝亷訶曰汝胞中猶蟊賊窩巢多少藏匿在未能細自省察便漫謂無耳吳生曰但此志一真便雜念自消何須防檢至此孝亷曰不然必搜滌諸雜念盡淨廓清後此志乃有樹也昕夕爭論如是既至越謁先生已各就館先生故深居簡出出應四方來學者就質有常期一日值先生出應來學期孝亷趣吳以前論辨語往質正先生時燕居樓上餐饘聆吳生語已不答第目攝而指示之曰子視此盂中下便能載此饘此樓下便能載此盂地又下便能載此樓人貴能下下乃大語已更目攝吳生者再竟無他語吳生退就舍孝亷問曰先生時何言吳生咽哽不能應第潸然涕數行下也孝亷後仕為邑令以循亷著吳生年八十力學不倦屢空終身晏如也皆無愧師門云愚按先生之爐錘人也不在言論辨析而在神情衡宇間即於吳生可類知己雖然跡郭吳二君之舟中省憤若此即來學初已自得師矣豈若世之漫然係籍者哉有一屬官因久聽講先生之學曰此學甚好只是簿書訟獄繁難不得為學先生聞之曰我何嘗教爾離了簿書訟獄懸空去講學爾既有官司之事便從官司的事上為學才是真格物如問一詞訟不可因其應對無狀起箇怒心不可因他言語圓轉生箇喜心不可惡其囑託加意治之不可因其請求屈意從之不可因自己事務煩冗隨意茍且斷之不可因旁人譛毁羅織任人意思處之這許多意思皆私只爾自知須精細省察克治惟恐此心有一毫偏倚枉人是非這便是格物致知簿書訟獄之間無非實學若離了事物為學却是著空凡人言語正到快意時便截然能忍默得意氣正到發揚時便翕然能收斂得忿怒嗜欲正到沸騰時便廓然能消化得此非天下之大勇者不能也然見得良知親切時其工夫又自不難緣此數病良知之所本無只因良知昏昧蔽塞而後有若良知一提醒時即如白日一出而魍魎自消矣變化氣質居常無所見惟當利害經變故遭屈辱平時忿怒者到此能不忿怒憂惶失措者到此能不憂惶失措始是能有得力處亦便是用力處先生飬痾陽明洞時與一布衣許璋者相朝夕取其資益云璋上虞人淳質苦行潜心性命之學其於世味泊如也嘗躡屩走嶺南訪白沙陳先生其友王司輿以詩送之曰去歲逢黃石今年訪白沙云璋故精于天文地理兵法竒門九遁之學先生後擒逆濠多得其力成功歸贈以金帛不受先生每乘筍輿訪之山中菜羮麥飯信宿不厭殁後先生題其墓曰處士許璋之墓屬知縣楊紹芳立石焉往謂先生學無師承據璋曾經事白沙而先生與之深交諒亦有私淑之者夫先生天授之資猶然取於人者如此吾儕顧獨學而不藉師友望其有成也難哉嘉靖初紹興有三尚書韓公邦問王公鑑之及先生也韓公與先生父海日翁同輩先生事之甚謹一日冬至節皆赴公所稱賀先生自謂勳臣貂蟬朝服乘馬而趨俄從人報韓尚書在後先生亟下馬執笏立道左韓公至不下輿第拱手曰伯安行矣豫先往遂行先生俟其過乃上馬當是時韓公偃然以前輩自居先生欿然不以伯爵自重古道兩足徴云張廷撰陽和言見紹興志魯文恪公鐸為舉人時屬逺行雪雨泥濘夜止旅舍宿憐馬卒寒苦即令臥之衾下因賦詩云半破青衫弱稚兒馬前怎得浪驅馳凡由父母皆為子小異閭閻我却誰事在世情皆可笑恩從吾幼未難推泥途還藉來朝力伸縮相加莫漫疑又為秀才時曾有詩云古樹岡頭屋數椽主人家世只殘編居臨江漢東南㑹運到雲龍五百年七澤鳶魚渾道體九州兄弟或顛連西周老鳯雛將近㑹見梧桐月影圓即公家食時其志趣如此今富貴家子弟鞭撻童僕不知輕重忍視骨肉疾苦殆猶秦越獨何心哉何學憲公景明公初授中書舍人奉敬皇帝哀詔下雲南逺方君長及中貴人咸贈遺象犀珍貝謝弗受後逆瑾用事上書諸大臣言宜自振立以抑瑾權不用謝病歸踰年免官瑾敗李文正薦復原官直內閣制敕房經筵官其友李夢陽遭江西之訟衆多媒糵其短莫肯為直者公獨上書爭之訟得辨乾清宫災上書陳時政極言義子不可蓄宦官不當寵疏留中不下人為寒心時四方學士咸願知公車馬填門巷錢寧欲交歡公持古畫求題謝曰此名畫不可㸃汚卒不許師御史客死京邸中人廖鵬贈之棺公叱郤之曰吾友生不茍受豈以死受之哉遂自出金賻之公和粹冲夷人樂為友衆目為台輔中人然性簡意寬不善事樞要遂出為校文之職年亦不永人咸惜其未竟厥詣云附待詔文公徴明以行誼文翰重一時諸造請户外屨常滿然先生所與從請獨書生故人子屬為姻黨而窘者雖強之竟日不倦其他即郡國守相連車騎富商賈人珍寶填溢於里門外不能博先生一赫蹄而先生所最慎者藩邸其所絶不肯還往者中貴人曰此國家法也前此周王以古鼎古鏡徽王以金寶缶他珍貨直數百鎰使者言曰王無所求於先生慕先生耳盍為一啓封先生遜謝曰王賜也啓之而後辭不恭竟弗啓論曰清華地望實世之羶府蠅蟻所必集亦世之招的彈射所共指也先輩之交際來往慎重如此雖文字翰墨亦不輕假有以也若康德涵拯友於急難義誠至高亦蹈從井之愚矣惜夫昔祭酒陳公敬宗王振慕其名因巡撫周公忱求見公曰某忝為人師而求謁中貴他日無以見諸生忱乃謂振曰陳祭酒書法極高以求書為名先之禮幣彼將謁謝矣振然之乃遣綵段羊酒求書程子四針敬宗為走筆書之而反其禮幣竟不往見以此故為祭酒十八年不遷吕涇野先生柟既入翰林力學慕古時逆瑾用事以先生鄉人欲引先生為重啖先生驟與卿佐且援先朝故事得入內閣先生遜避不與往來瑾憾且中傷先生㑹瑾敗得已嘉靖中夏貴溪怙寵負材傲睨一世顧獨欽心先生先生遷南少宗伯時貴溪贈先生詩云天下有道惟涇野其尊信也如此而貴溪故與霍文敏交惡文敏之為南宗伯也時先生為二文敏時時噂詬貴溪先生常乘間規諷謂非大臣體文敏疑先生為夏黨銜之所以加先生者人多為不堪已先生以滿考來闕下時貴溪方柄國得先生甚歡亟欲援先生助己一日延先生飲座中數持文敏短至謂不可一日近者先生毅然曰霍君性雖少褊故天下才也公兹為國斂才即當推轂霍君奈何以寸朽棄連抱耶貴溪則以先生衷附文敏而異已大不恱先生以是竟數歲不遷卒以廟災䇿免云嗟夫即先生之遇二公不阿勢不留怨不隱賢惟古休休大臣如此哉抑余於先生猶有重感焉先生故與鄒文莊守益同官先生尊崇朱學主先知後行說文莊承服師傳時以知行合一㫖啓先生先生咈不省每晤必辨辨必至閧然而爭若聚訟然迹甚違忤矣乃先生與文莊交情不啻同胞夷險離合真是一體初未嘗以議論異同少生間關也或曰二先生意見雖殊其志行同矣乃若武功康廷撰豪邁任放人也人傳其靡麗侈汰聲伎不離左右而先生故平生清約如寒酸即嚬笑不茍者乃先生亦與之為深分交更不以行己清濁生分别其大如此比見談學者意見相左則衷起戈鋋格調稍殊則眼分青白記短則兼折其長貶過則并伐其善而猶曰吾心本來無物然耶否耶文莊東廓鄒先生守益字謙之甘泉湛先生九十餘遊衡嶽便過吉州遊青原山先生率郡中同志友二三百人走迎且戒之曰湛先生當兹高年猶殷殷訪友如此即此可證其學矣古云憲老不乞言吾儕第應憲之更不容出一語辨詰煩聒先生也晨夕定省食而執醬執酳一遵古養老禮惟謹維時先生年亦近七十矣蓋以湛先生為師王文成莫逆友故事之謹如此嗣湛先生别歸先生送至境上别時淚潸然橫下沾襟湛先生顧慰之曰謙之何悲甚豈念豫老不復再㑹耶余過十數年重來晤公也余緬想當時此段風光良知天理炯然在目即唐虞之廷洙泗之間喜起誾侃之風何以尚諸先生有孫曰德涵字汝海曰德溥字汝光世紹其學云伯子汝海性資英發悟學後自信當仁無讓有狂簡趣仲子汝光性故沈潜自孺孩即徇齊不弄既志學充養益粹以此吉州鄉評多謂仲子賢尤加於伯兄云一日張廷撰元忭顧謂余曰鄒伯子之賢視仲子尤加也余曰云何曰即吾身受伯子益厚矣昔吾叨及第後伯子一日儼然造我座已既茶曰兄可再茶吾有一言奉告茶既再吾攄誠以請伯子曰兄兹以掄大魁為榮耶顧兄由兹益𢎞逺志崇令德則大魁者今士林所歆艷豈不為榮顧少不自愛即淺鮮過失人皆得而指摘之矣是大魁者亦播惡之幟也可不日惕乎哉吾聆已頓首數四以謝到今耿耿服膺不敢忘也或聞之謂余曰進言者賢乎抑受言者賢也吾昔亦嘗如此效忠告於若輩矣徐察其意若忤自是交益暌由此以觀鄒伯子誠賢陽和尤賢乎哉附太宰默庵吳公鵬筮仕都水主事提督徂徠泉前任為湖州陳公良謨公特訪之别時問曰兄何以教我陳公具一小冊題曰交新忠告條於左曰某事吾所經畫頗當君宜仍之某事宜於前而今有弊吾欲改未改君宜易之某人可用君用之勿疑某人不可用吾欲黜未黜君宜黜之凡十餘條吳公初至按冊試一二衆以為宜乃遂悉措諸行人翕然稱善吳公後官冢宰以是與陳公為相知餘姚楊二檀撫亦以都水管理濟寧以南閘河代者為李某二檀亦告之如陳公所以告吳公者李唯唯而心銜之向人曰楊君聖人耶三代相承猶有損益渠必欲吾一一遵之何耶李後為考功郎竟索楊公瘢去其官夫陳與楊之忠告一也一為相知一成仇隙何相懸若是亦係夫人之所遇幸不幸耳而二公之所存固可知矣吁進言者亦視其人哉念菴羅先生洪先魁天下時才弱冠時外舅官棘寺卿報初下喜甚趨告先生曰喜吾壻乃今幹此大事也先生聆已而項發赤對曰丈夫事業不知更有多少在此等三年遞一人耳奚足為大事耶是日猶自袖米偕黃何二孝亷聫榻蕭寺中論學焉黃號樂村何號善山親受陽明之學者先生赴南宫附其舟嚴事之以相資切先生時兢兢然步趨不踰繩矩心疑二孝亷言動舉止若無異于人者一日有友來與二孝亷商學何孝亷慨曰近世號名講學者綜其衷微皆先人心耳先生側聆之戄然自省自是學益近裏篤信陽明良知之㫖云既官翰林踰年念其父憲副公不置請告歸至儀真病幾殆留數月有瓜洲富人王紀者坐事為同年項甌東某按治乃飾名姝介萬金謁求解已峻拒之矣而項聞之微以意嘗先生先生辭益厲項嘆服遂定交為深分既歸悔曰紀所遺當拒而罪不當死久之有同年饒比部録刑江北致書生之已弗逮矣為之憮然是後二年先生侍雙泉公于家公訓飭不殊童稚言動少錯辭色必厲客至令衣冠行酒拂席授几如命從事欣欣如也後入春坊進講與其友唐荆川順之趙浚谷時春居相比荆川每語先生之學輒傾誠嘆服而浚谷生西北未悉也一日邀先生出遊屬其內子謁曽夫人窺室中故啓一篋一無所有乃曰羅君內外皭然如此由是三公交好浸密日相期許以天下自任中外咸稱異之曰三翰林云論曰惟今寰內逢掖士育黌序志青雲者麗不億也既上公車試南宫對大庭褎然居首選是數千萬人之一人也詎不稱俊傑乎哉惟我昭代自洪武辛亥制科以來膺是選者計百有竒乃其流鴻垂茂于奕世者幾耶先生立朝曽未卒歲鮮所建樹矣乃今學者宗仰之不啻山斗則何以哉惟先生臚傳初聆外舅欣羡語輒面項發赤胞中故自無大魁也余讀先生集緬思先生晚年學之所進胞中不獨無大魁即若所禔修若所解悟者諒亦自視若無矣何以明其然跡先生蚤知大丈夫事業無窮盡便知學問亦無盡也世為禪者曰先生斤斤然好修者爾未徹性也頃陸司冦論宋儒獨推無垢謂其邃於禪宗云按史述無垢在越作幕官辭供給錢在館進書辭轉官人訝為好名無垢曰既請月俸又受供給偶然進書即便受賞於心不安何名之好貪者往往不曽尋思此心病也心有病人安得知我知之當自醫别人既不自知病又惡人醫病猶婦人妬者非特妬其夫且又妬人之夫其惑甚矣即無垢此論其學亦以本心為則聖學原如是也先生之禔修毋亦自得其本心耶抑聞無垢之言曰人於倉卒患難中處事不亂未必才識了得其必胸中器局不凡素有定力不然胸中先亂何以臨事古人平日欲涵飬器局者此也又曰處事速不如思便不如當用意不如平心即此語觀之無垢未嘗離事言心也噫如此談禪吾於禪無間然矣先進遺風卷上
